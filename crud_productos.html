<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cantor - Productos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/crud_productos.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            <span class="nav-title">Golden Cantor - Catálogo</span>
        </div>
        <div class="nav-user-info">
            <i class="fa-solid fa-user-shield"></i>
            <span id="txt-rol-gerente">Gerente</span>
        </div>
    </header>

    <main class="crud-container">
        <div class="card-panel">
            <h2 class="panel-title" id="form-titulo"><i class="fa-solid fa-box-open"></i> Registrar Nuevo Producto</h2>
            <form id="form-producto">
                <input type="hidden" id="edit-id" value="">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label">Nombre del Producto</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-signature input-icon"></i>
                            <input type="text" class="form-input" id="prod-nombre" placeholder="Ej. Perfume Intenso Red" required>
                        </div>
                    </div>
                    <div class="form-group full-width-mobile">
                        <label class="form-label">Código / ID Único</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-barcode input-icon"></i>
                            <input type="text" class="form-input" id="prod-codigo" placeholder="Ej. GC-001" required>
                        </div>
                    </div>
                    <div class="form-group full-width-mobile">
                        <label class="form-label">Categoría</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tags input-icon"></i>
                            <select class="form-select" id="prod-categoria" style="padding-left: 40px;" required>
                                <option value="Perfumes">Perfumes</option>
                                <option value="Lociones">Lociones</option>
                                <option value="Esencias">Esencias</option>
                                <option value="Accesorios">Accesorios</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group full-width-mobile">
                        <label class="form-label">Precio de Venta ($)</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tag input-icon" style="color: var(--verde-exito);"></i>
                            <input type="number" class="form-input" id="prod-precio" placeholder="0.00" min="0" step="0.01" required>
                        </div>
                    </div>
                    <div class="form-group full-width-mobile">
                        <label class="form-label">Stock</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-layer-group input-icon"></i>
                            <input type="number" class="form-input" id="prod-stock" placeholder="Cantidad" min="0" required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secundario" id="btn-cancelar-edicion" style="display: none;">
                            <i class="fa-solid fa-ban"></i> Cancelar Edición
                        </button>
                        <button type="submit" class="btn btn-primario" id="btn-guardar">
                            <i class="fa-solid fa-floppy-disk"></i> Guardar Producto
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-panel">
            <div class="table-header-tools">
                <h2 class="panel-title" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">
                    <i class="fa-solid fa-boxes-stacked"></i> Inventario de Productos
                </h2>
                <div class="input-wrapper search-wrapper">
                    <i class="fa-solid fa-magnifying-glass input-icon"></i>
                    <input type="text" class="form-input" id="input-buscar" placeholder="Buscar por nombre o código...">
                </div>
            </div>
            <div class="table-container">
                <table class="crud-tabla">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos-cuerpo"></tbody>
                </table>
            </div>
            <div style="margin-top: 25px; display: flex; justify-content: flex-start;">
                <button type="button" class="btn btn-secundario" id="btn-volver-menu">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Menú
                </button>
            </div>
        </div>
    </main>

    <script>

        const sesionJSON = sessionStorage.getItem('usuario_activo');
        if (!sesionJSON) {
            alert("Acceso denegado. Por favor, inicie sesión primero.");
            window.location.href = 'iniciosesion.html';
        }

        const empleadoSesion = JSON.parse(sesionJSON);

        if (empleadoSesion.rol.toLowerCase() !== 'gerente') {
            alert("No tiene permisos de Gerente para acceder al catálogo.");
            sessionStorage.removeItem('usuario_activo'); 
            window.location.href = 'iniciosesion.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const txtRol = document.getElementById('txt-rol-gerente');
            if (txtRol) {
                txtRol.innerText = `Personal: ${empleadoSesion.nombre} (${empleadoSesion.rol})`;
            }
        });

        const API_URL = '../PHP/api_productos.php';

        window.addEventListener('DOMContentLoaded', cargarProductosBaseDatos);

        function cargarProductosBaseDatos() {
            fetch(API_URL)
                .then(res => res.json())
                .then(productos => { renderizarProductos(productos); })
                .catch(err => console.error("Error cargando inventario:", err));
        }

        function renderizarProductos(productos) {
            const tbody = document.getElementById('tabla-productos-cuerpo');
            tbody.innerHTML = '';
            if (productos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No hay productos registrados.</td></tr>`;
                return;
            }
            productos.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${p.codigo}</strong></td>
                    <td>${p.nombre}</td>
                    <td><span class="badge">${p.categoria}</span></td>
                    <td>$${parseFloat(p.precio).toFixed(2)}</td>
                    <td>${p.stock} u.</td>
                    <td>
                        <button class="btn btn-editar" onclick="cargarEdicion(${p.id})" style="padding: 5px 10px; margin-right: 5px; background-color: #f39c12; color:white; border:none; cursor:pointer; border-radius:4px;"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-eliminar" onclick="eliminarProducto(${p.id})" style="padding: 5px 10px; background-color: #e74c3c; color:white; border:none; cursor:pointer; border-radius:4px;"><i class="fa-solid fa-trash"></i></button>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('form-producto').addEventListener('submit', (e) => {
            e.preventDefault();
            const payload = {
                id: document.getElementById('edit-id').value,
                codigo: document.getElementById('prod-codigo').value.trim(),
                nombre: document.getElementById('prod-nombre').value.trim(),
                categoria: document.getElementById('prod-categoria').value,
                precio: parseFloat(document.getElementById('prod-precio').value),
                stock: parseInt(document.getElementById('prod-stock').value)
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                cancelarEdicion();
                cargarProductosBaseDatos();
            })
            .catch(err => console.error("Error al guardar:", err));
        });

        function cargarEdicion(id) {
            fetch(`${API_URL}?id=${id}`)
                .then(res => res.json())
                .then(p => {
                    document.getElementById('edit-id').value = p.id;
                    document.getElementById('prod-codigo').value = p.codigo;
                    document.getElementById('prod-nombre').value = p.nombre;
                    document.getElementById('prod-categoria').value = p.categoria;
                    document.getElementById('prod-precio').value = p.precio;
                    document.getElementById('prod-stock').value = p.stock;
                    document.getElementById('form-titulo').innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Modificando: ${p.codigo}`;
                    document.getElementById('btn-guardar').innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Actualizar en Base de Datos`;
                    document.getElementById('btn-cancelar-edicion').style.display = 'inline-flex';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
        }

        function eliminarProducto(id) {
            if (confirm('¿Deseas borrar este producto?')) {
                fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    cargarProductosBaseDatos();
                });
            }
        }

        function cancelarEdicion() {
            document.getElementById('form-producto').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-titulo').innerHTML = `<i class="fa-solid fa-box-open"></i> Registrar Nuevo Producto`;
            document.getElementById('btn-guardar').innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Guardar Producto`;
            document.getElementById('btn-cancelar-edicion').style.display = 'none';
        }

        document.getElementById('btn-cancelar-edicion').addEventListener('click', cancelarEdicion);

        document.getElementById('input-buscar').addEventListener('input', (e) => {
            const termino = e.target.value.toLowerCase();
            const filas = document.querySelectorAll('#tabla-productos-cuerpo tr');
            filas.forEach(f => {
                f.style.display = f.textContent.toLowerCase().includes(termino) ? '' : 'none';
            });
        });

        document.getElementById('btn-volver-menu').addEventListener('click', () => {
            window.location.href = 'menu_gerente.html';
        });
    </script>
</body>
</html>
