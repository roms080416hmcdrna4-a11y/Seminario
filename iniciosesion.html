<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cantor - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/iniciosesion.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-wrapper">
            <img src="../IMG/LogoGoldenCantor.png" alt="Golden Cantor Logo" class="logo-img">
        </div>

        <h1 class="brand-title">Golden Cantor</h1>
        <p class="brand-slogan">Huele bien todo el día</p>

        <h2 class="welcome-title">BIENVENIDO</h2>
        <p class="subtitle">Inicia sesión</p>

        <form id="form-login">
            <div class="form-group">
                <label class="form-label">Usuario:</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" class="form-input" id="usuario" name="usuario" placeholder="Usuario" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña:</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" class="form-input" id="contrasena" name="contrasena" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Iniciar sesión</button>
        </form>
    </div>

    <script>
document.getElementById('form-login').addEventListener('submit', function(e) {
    e.preventDefault();
    const txtUsuario = document.getElementById('usuario').value.trim();
    const txtContrasena = document.getElementById('contrasena').value.trim();

    if (txtUsuario === "" || txtContrasena === "") {
        alert("Por favor, escribe tu usuario y contraseña.");
        return;
    }
    fetch('../PHP/api_inicio.php', {
        method: 'POST', 
        headers: { 
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ 
            usuario: txtUsuario, 
            contrasena: txtContrasena 
        })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Error en la respuesta del servidor (Código HTTP: " + res.status + ")");
        }
        return res.json();
    })
    .then(data => {
        if (data.status === 'success') {
            alert(data.message);
            
            sessionStorage.setItem('usuario_activo', JSON.stringify(data.usuario));

            if (data.usuario.rol.toLowerCase() === 'gerente') {
                window.location.href = 'menu_gerente.html'; 
            } else {
                window.location.href = 'caja.html'; 
            }
        } else {
            alert(data.message);
        }
    })
    .catch(err => {
        console.error("Error detectado en la petición fetch:", err);
        alert("No se pudo conectar con la API de inicio de sesión. Asegúrate de estar abriendo el sistema usando localhost y que la ruta '../PHP/api_inicio.php' sea correcta.");
    });
});
    </script>
</body>
</html>
