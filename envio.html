<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cantor - Envío</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/envio.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            
            <span class="nav-title">Golden Cantor - Envio</span>
        </div>
    </header>

    <main class="shipping-layout">
        <div class="card-panel">
            <h1 class="panel-title"><i class="fa-solid fa-truck-fast"></i> Programar Envío de Pedido</h1>
            
            <form id="form-envio">
                
                <div class="section-subtitle"><i class="fa-solid fa-user"></i> Datos del Destinatario</div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Nombre Completo</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user-tag input-icon"></i>
                            <input type="text" class="form-input" id="envio-nombre" placeholder="Ej. Rut Neptali" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Teléfono de Contacto</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone input-icon"></i>
                            <input type="tel" class="form-input" id="envio-telefono" placeholder="Ej. 5572156458" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Correo Electrónico (Opcional)</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" class="form-input" id="envio-correo" placeholder="ejemplo@correo.com">
                        </div>
                    </div>
                </div>

                <div class="section-subtitle"><i class="fa-solid fa-map-location-dot"></i> Dirección de Entrega</div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Calle y Número</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-house input-icon"></i>
                            <input type="text" class="form-input" id="envio-calle" placeholder="Nombre de la calle, número ext. o int." required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Colonia / Barrio</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tree-city input-icon"></i>
                            <input type="text" class="form-input" id="envio-colonia" placeholder="Ej. Universidad Autonoma Metropolitana" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Código Postal</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-mail-bulk input-icon"></i>
                            <input type="text" class="form-input" id="envio-cp" placeholder="Ej. 55000" required>
                        </div>
                    </div>
                </div>

                <div class="section-subtitle"><i class="fa-solid fa-boxes-packing"></i> Detalles de Logística</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Paquetería / Método</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-配達 input-icon"><i class="fa-solid fa-boxes-direction"></i></i>
                            <select class="form-select" id="envio-metodo" style="padding-left: 40px;" required>
                                <option value="estandar">Envío Estándar Local</option>
                                <option value="express">Envío Express (Mismo día)</option>
                                <option value="paqueteria">Paquetería Externa (FedEx/DHL)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Fecha Estimada de Entrega</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar-check input-icon"></i>
                            <input type="date" class="form-input" id="envio-fecha-entrega" required>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">Notas de Entrega / Referencias</label>
                        <textarea class="form-textarea" id="envio-notas" placeholder="Color de casa, entre qué calles se encuentra, horario preferente de entrega, etc."></textarea>
                    </div>
                </div>

                <div class="actions-container">
                    <button type="button" class="btn btn-secundario" id="btn-cancelar">
                        <i class="fa-solid fa-xmark"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primario">
                        <i class="fa-solid fa-paper-plane"></i> Confirmar y Generar Guía
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Calculamos automáticamente la fecha estimada (por defecto, 3 días después de hoy)
            const fechaActual = new Date();
            fechaActual.setDate(fechaActual.getDate() + 3);
            
            const fechaEstimada = fechaActual.toISOString().split('T')[0];
            document.getElementById('envio-fecha-entrega').value = fechaEstimada;
        });

        // Acción al cancelar o regresar
        document.getElementById('btn-cancelar').addEventListener('click', () => {
            // Te regresa a la pantalla de caja de manera intuitiva
            window.location.href = '../HTML/caja.html'; 
        });

        // Acción al procesar el formulario de envío
        document.getElementById('form-envio').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('envio-nombre').value;
            const telefono = document.getElementById('envio-telefono').value;
            
            alert(`¡Orden de Envío Registrada con Éxito!\n\nDestinatario: ${nombre}\nTeléfono: ${telefono}\nSe ha generado la orden de logística correctamente.`);
            
            // Una vez exitoso, limpia y regresa a la caja principal
            window.location.href = 'caja.html';
        });
    </script>
</body>
</html>
