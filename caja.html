<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cantor - Sistema de Caja</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/caja.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-brand">
            <span class="nav-title">Golden Cantor</span>
        </div>
        <div class="nav-user-info">
            <i class="fa-solid fa-circle-user"></i>
            <span id="txt-personal">Personal: Vendedor</span>
        </div>
    </header>

    <main class="main-layout">
        
        <div class="panel-izquierdo">
            
            <div class="card-panel">
                <h2 class="panel-title"><i class="fa-solid fa-cart-plus"></i> Registrar Artículo</h2>
                <form id="form-caja" class="form-inline">
                    
                    <div class="form-group">
                        <label class="form-label">Producto / ID</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-barcode input-icon"></i>
                            <input type="text" class="form-input" id="input-producto" placeholder="Escribe el Codigo o nombre del producto" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Cantidad</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-layer-group input-icon"></i>
                            <input type="number" class="form-input" id="input-cantidad" min="1" value="1" required>
                        </div>
                    </div>

                    <div class="form-group" style="justify-content: flex-end;">
                        <button type="submit" class="btn btn-secundario" style="padding: 12px;"><i class="fa-solid fa-plus"></i> Añadir</button>
                    </div>

                </form>
            </div>

            <div class="card-panel" style="flex: 1;">
                <h2 class="panel-title"><i class="fa-solid fa-list-check"></i> Lista de Venta Actual</h2>
                <div class="table-container">
                    <table class="productos-tabla">
                        <thead>
                            <tr>
                                <th>Código/Nombre</th>
                                <th>Cantidad</th>
                                <th>Precio Unit.</th>
                                <th>Subtotal</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cuerpo">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>

        <div class="panel-derecho">
            <div>
                <h2 class="panel-title"><i class="fa-solid fa-receipt"></i> Resumen de Cuenta</h2>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label class="form-label">Fecha de Operación</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-calendar-days input-icon"></i>
                        <input type="date" class="form-input" id="input-fecha" required>
                    </div>
                </div>

                <div class="resumen-valores">
                    <div class="resumen-item">
                        <span>Subtotal bruto</span>
                        <span id="txt-subtotal">$0.00</span>
                    </div>
                    <div class="resumen-item">
                        <span>Impuestos (IVA)</span>
                        <span id="txt-iva">$0.00</span>
                    </div>
                    <div class="resumen-item total">
                        <span>TOTAL:</span>
                        <span class="total-precio" id="txt-total">$0.00</span>
                    </div>
                </div>
            </div>

            <div class="actions-vertical">
                <button type="button" class="btn btn-cobrar" id="btn-finalizar">
                    <i class="fa-solid fa-credit-card"></i> Finalizar Compra
                </button>
                <button type="button" class="btn btn-secundario" id="btn-envio">
                    <i class="fa-solid fa-truck-fast"></i> Solicitar Envío
                </button>
                <button type="button" class="btn btn-secundario" id="btn-regresar" style="color: var(--texto-mutado);">
                    <i class="fa-solid fa-arrow-left"></i> Salir y Cerrar sesion 
                </button>
            </div>
        </div>
    </main>

    <script>
let carrito = [];
let empleadoSesion = { nombre: "Vendedor" };

window.addEventListener('DOMContentLoaded', () => {

    const sesion = sessionStorage.getItem('usuario_activo');
    if (sesion) {
        empleadoSesion = JSON.parse(sesion);
        document.getElementById('txt-personal').innerText = `Personal: ${empleadoSesion.nombre} (${empleadoSesion.rol})`;
    }

    document.getElementById('input-fecha').value = new Date().toISOString().split('T')[0];
    renderizarTabla();
});


document.getElementById('form-caja').addEventListener('submit', (e) => {
    e.preventDefault();
    const busqueda = document.getElementById('input-producto').value.trim();
    const cantidad = parseInt(document.getElementById('input-cantidad').value) || 1;

    if (!busqueda) return;

    fetch(`../PHP/api_caja.php?buscar=${encodeURIComponent(busqueda)}`)
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            const prod = data.producto;
            if (prod.stock < cantidad) {
                alert(`Stock insuficiente. Solo quedan: ${prod.stock} piezas.`);
                return;
            }

            const index = carrito.findIndex(item => item.id_db === prod.id);
            if (index !== -1) {
                if(carrito[index].cantidad + cantidad > prod.stock){
                    alert("No puedes agregar más de las existencias reales.");
                    return;
                }
                carrito[index].cantidad += cantidad;
                carrito[index].subtotal = carrito[index].cantidad * carrito[index].precioUnitario;
            } else {
                carrito.push({
                    id: Date.now(),
                    id_db: prod.id,
                    nombre: `[${prod.codigo}] ${prod.nombre}`,
                    cantidad: cantidad,
                    precioUnitario: parseFloat(prod.precio),
                    subtotal: cantidad * parseFloat(prod.precio)
                });
            }
            document.getElementById('input-producto').value = '';
            renderizarTabla();
        } else {
            alert(data.message);
        }
    });
});

function renderizarTabla() {
    const tbody = document.getElementById('tabla-cuerpo');
    tbody.innerHTML = '';
    let total = 0;

    if (carrito.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">La tabla está vacía.</td></tr>`;
    } else {
        carrito.forEach(item => {
            total += item.subtotal;
            tbody.innerHTML += `<tr>
                <td>${item.nombre}</td>
                <td>${item.cantidad}</td>
                <td>$${item.precioUnitario.toFixed(2)}</td>
                <td>$${item.subtotal.toFixed(2)}</td>
                <td><button class="btn-delete" onclick="eliminarProducto(${item.id})"><i class="fa-solid fa-trash"></i></button></td>
            </tr>`;
        });
    }
    document.getElementById('txt-subtotal').innerText = `$${total.toFixed(2)}`;
    document.getElementById('txt-total').innerText = `$${total.toFixed(2)}`;
}

function eliminarProducto(id) {
    carrito = carrito.filter(item => item.id !== id);
    renderizarTabla();
}

document.getElementById('btn-finalizar').addEventListener('click', () => {
    if (carrito.length === 0) return alert('La tabla está vacía.');

    const totalFinal = carrito.reduce((sum, item) => sum + item.subtotal, 0);
    const payload = {
        productos: carrito,
        total: totalFinal,
        fecha: document.getElementById('input-fecha').value,
        vendedor: empleadoSesion.nombre
    };

    fetch('../PHP/api_caja.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        if (data.status === 'success') {
            carrito = [];
            renderizarTabla();
        }
    });
});

document.getElementById('btn-envio').addEventListener('click', () => {
    if (carrito.length === 0) return alert('Por favor, añade primero productos.');
    
    sessionStorage.setItem('carrito_envio', JSON.stringify({
        productos: carrito,
        total: carrito.reduce((sum, item) => sum + item.subtotal, 0)
    }));
    window.location.href = 'envio.html';
});

document.getElementById('btn-regresar').addEventListener('click', () => {
    window.location.href = 'iniciosesion.html';
});
    </script>
</body>
</html>
