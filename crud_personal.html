<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cantor - Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/crud_personal.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-brand">
            <span class="nav-title">Golden Cantor - Personal</span>
        </div>
        <div class="nav-user-info">
            <i class="fa-solid fa-user-shield"></i>
            <span id="txt-personal">Gerente</span>
        </div>
    </header>

    <main class="crud-container">
        
        <div class="card-panel">
            <h2 class="panel-title" id="form-titulo"><i class="fa-solid fa-user-plus"></i> Registrar Nuevo Empleado</h2>
            
            <form id="form-personal">
                <input type="hidden" id="edit-id" value="">

                <div class="form-grid">
                    <div class="form-group" style="grid-column: span 2;">
                        <label class="form-label">Nombre Completo</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" class="form-input" id="per-nombre" placeholder="Ej. Carlos Mendoza Torres" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Rol</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user-gear input-icon"></i>
                            <select class="form-select" id="per-rol" style="padding-left: 40px;" required>
                                <option value="Vendedor">Vendedor</option>
                                <option value="Gerente">Gerente</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nombre de Usuario (Login)</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-at input-icon"></i>
                            <input type="text" class="form-input" id="per-usuario" placeholder="Ej. carlos_m" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="per-pass" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Estado Inicial</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-toggle-on input-icon"></i>
                            <select class="form-select" id="per-estado" style="padding-left: 40px;" required>
                                <option value="Activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secundario" id="btn-cancelar-edicion" style="display: none;">
                            <i class="fa-solid fa-ban"></i> Cancelar Edición
                        </button>
                        <button type="submit" class="btn btn-primario" id="btn-guardar">
                            <i class="fa-solid fa-floppy-disk"></i> Guardar Empleado 
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-panel">
            <div class="table-header-tools">
                <h2 class="panel-title" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">
                    <i class="fa-solid fa-users"></i> Lista de Personal
                </h2>
                
                <div class="input-wrapper search-wrapper">
                    <i class="fa-solid fa-magnifying-glass input-icon"></i>
                    <input type="text" class="form-input" id="input-buscar" placeholder="Buscar por nombre, usuario o rol...">
                </div>
            </div>

            <div class="table-container">
                <table class="crud-tabla">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Usuario</th>
                            <th>Contraseña</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-personal-cuerpo">
                    </tbody>
                </table>
            </div>
            
            <div style="margin-top: 25px; display: flex; justify-content: flex-start;">
                <button type="button" class="btn btn-secundario" id="btn-volver-menu">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Menú
                </button>
            </div>
        </div>

    </main>

    <script>
const API_URL = '../PHP/api_personal.php';

window.addEventListener('DOMContentLoaded', () => {

    const sesion = sessionStorage.getItem('usuario_activo');
    if (!sesion) {
        alert("Acceso denegado. Por favor, inicie sesión primero.");
        window.location.href = 'iniciosesion.html';
        return;
    }

    const empleadoSesion = JSON.parse(sesion);
    

    document.getElementById('txt-personal').innerText = `Personal: ${empleadoSesion.nombre} (${empleadoSesion.rol})`;
    cargarPersonalBaseDatos();
});

function cargarPersonalBaseDatos() {
    fetch(API_URL)
        .then(res => res.json())
        .then(personal => {
            renderizarPersonal(personal);
        })
        .catch(err => console.error("Error al procesar la plantilla de empleados:", err));
}

function renderizarPersonal(lista) {
    const cuerpo = document.getElementById('tabla-personal-cuerpo');
    
    if (!cuerpo) {
        console.error("Error: No se encontró el elemento 'tabla-personal-cuerpo' en el HTML.");
        return;
    }

    cuerpo.innerHTML = '';

    if (!Array.isArray(lista) || lista.length === 0) {
        cuerpo.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--texto-mutado);">No se encontraron empleados registrados en MariaDB</td></tr>`;
        return;
    }

    lista.forEach(p => {
        const fila = document.createElement('tr');
        
        const claseBadge = p.estado === 'Activo' ? 'status-badge activo' : 'status-badge inactivo';
        const iconoEstado = p.estado === 'Activo' ? 'fa-solid fa-user-slash' : 'fa-solid fa-user-check';
        const tituloAccion = p.estado === 'Activo' ? 'Dar de Baja' : 'Activar Colaborador';
        const claseAccionEstado = p.estado === 'Activo' ? 'btn-table btn-toggle-status' : 'btn-table btn-toggle-status active-action';

        fila.innerHTML = `
            <td style="font-weight: 600;">${p.nombre}</td>
            <td style="color: var(--rojo-primario); font-family: monospace;">@${p.usuario}</td>
            <td>••••••••</td>
            <td>${p.rol}</td>
            <td><span class="${claseBadge}">${p.estado}</span></td>
            <td>
                <div class="action-buttons">
                    <button class="btn-table btn-edit" onclick="cargarEdicion('${p.id}')" title="Editar"><i class="fa-solid fa-user-pen"></i></button>
                    <button class="${claseAccionEstado}" onclick="cambiarEstado('${p.id}')" title="${tituloAccion}"><i class="${iconoEstado}"></i></button>
                </div>
            </td>
        `;
        cuerpo.appendChild(fila);
    });
}

document.getElementById('form-personal').addEventListener('submit', (e) => {
    e.preventDefault();

    const payload = {
        id: document.getElementById('edit-id').value,
        nombre: document.getElementById('per-nombre').value.trim(),
        usuario: document.getElementById('per-usuario').value.trim(),
        pass: document.getElementById('per-pass').value,
        rol: document.getElementById('per-rol').value,
        estado: document.getElementById('per-estado').value
    };

    fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === 'success') {
            alert(data.message);
            cancelarEdicion();
            cargarPersonalBaseDatos();
        } else {
            alert("Error: " + data.message);
        }
    });
});

function cargarEdicion(id) {
    fetch(`${API_URL}?id=${id}`)
        .then(res => res.json())
        .then(p => {
            document.getElementById('edit-id').value = p.id;
            document.getElementById('per-nombre').value = p.nombre;
            document.getElementById('per-usuario').value = p.usuario;
            document.getElementById('per-pass').value = ""; 
            document.getElementById('per-pass').placeholder = "Dejar vacío para no cambiar";
            document.getElementById('per-pass').required = false; 
            document.getElementById('per-rol').value = p.rol;
            document.getElementById('per-estado').value = p.estado;

            document.getElementById('form-titulo').innerHTML = `<i class="fa-solid fa-user-pen"></i> Modificando Ficha de: ${p.usuario}`;
            document.getElementById('btn-guardar').innerHTML = `<i class="fa-solid fa-user-check"></i> Guardar Cambios en BD`;
            document.getElementById('btn-cancelar-edicion').style.display = 'inline-flex';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
}

function cancelarEdicion() {
    document.getElementById('form-personal').reset();
    document.getElementById('edit-id').value = '';
    document.getElementById('per-pass').placeholder = "••••••••";
    document.getElementById('per-pass').required = true; 
    document.getElementById('form-titulo').innerHTML = `<i class="fa-solid fa-user-plus"></i> Registrar Nuevo Empleado`;
    document.getElementById('btn-guardar').innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Guardar Colaborador`;
    document.getElementById('btn-cancelar-edicion').style.display = 'none';
}

document.getElementById('btn-cancelar-edicion').addEventListener('click', cancelarEdicion);

function cambiarEstado(id) {
    fetch(`${API_URL}?id=${id}`)
        .then(res => res.json())
        .then(p => {
            const nuevoEstado = p.estado === 'Activo' ? 'Inactivo' : 'Activo';
            
            if (confirm(`¿Seguro que deseas marcar al usuario @${p.usuario} como [${nuevoEstado}]?`)) {
                fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, estado: nuevoEstado })
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    cargarPersonalBaseDatos();
                });
            }
        });
}

document.getElementById('input-buscar').addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase().trim();
    
    fetch(API_URL)
        .then(res => res.json())
        .then(personal => {
            const filtrados = personal.filter(p => 
                p.nombre.toLowerCase().includes(texto) || 
                p.usuario.toLowerCase().includes(texto) ||
                p.rol.toLowerCase().includes(texto)
            );
            renderizarPersonal(filtrados);
        });
});

document.getElementById('btn-volver-menu').addEventListener('click', () => {
    window.location.href = 'menu_gerente.html';
});
    </script>
</body>
</html>
